name: Reusable Release (GitHub Packages)

# Publishes changed @vinny/* packages to GitHub Packages on a release tag.
# Caller usage (in vinny-platform, .github/workflows/release.yml):
#   on:
#     push:
#       tags: ["v*"]
#   jobs:
#     release:
#       uses: GENIEMARKETING/.github/.github/workflows/release.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: pnpm build
      - name: Publish changed packages
        run: pnpm -r publish --no-git-checks --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
