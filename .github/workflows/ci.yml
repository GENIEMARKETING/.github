name: Reusable CI

# The org-wide gate DAG every repo references:
#   install → typecheck → Biome → build → Playwright + axe → Lighthouse-CI (+ ZAP baseline)
#   → dependency audit → gitleaks → mistakes-registry
# A new enforced check added here applies to every repo at once.
#
# Design notes:
#   - 100% OSS, no paid services. gitleaks runs from the upstream binary
#     (the gitleaks-action requires a paid GITLEAKS_LICENSE on org repos, so we
#     avoid it). Lighthouse-CI, axe and OWASP ZAP are OSS.
#   - Package-manager aware: auto-detects pnpm / yarn / npm from the lockfile, so
#     a pnpm monorepo and a legacy npm/Vite site can both call this one workflow.
#   - Adopt-anywhere: typecheck / Biome / build / e2e each auto-skip when the repo
#     doesn't define them (no script, no config) or when turned off by input.
#     The ALWAYS-ON floor for every repo is gitleaks + the mistakes-registry hook.
#     => a brand-new bespoke site passes with just the secret scan; a platform
#        site (vinny-init) runs the full gate. Sites opt into more as they adopt it.
#
# Caller usage — platform site (full gate):
#   jobs:
#     ci:
#       uses: GENIEMARKETING/.github/.github/workflows/ci.yml@main
#       secrets: inherit
# Caller usage — legacy site (lightweight floor; build needs no CI secrets):
#       with: { run-build: false, run-e2e: false, run-lighthouse: false }

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      biome-version:
        description: "Exact Biome version CI runs (pin, not 'latest'). MUST match the
          $schema in the repo's biome.json so a new Biome release can't break a
          previously-formatted tree. Bump this in lockstep with `biome migrate`."
        type: string
        default: "2.4.16"
      build-command:
        description: "Explicit build command override. Empty = auto-run the repo's build script."
        type: string
        default: ""
      start-command:
        description: "Command that boots the app for Lighthouse (e.g. npm start)."
        type: string
        default: "npm start"
      lighthouse-url:
        type: string
        default: "http://localhost:3000"
      run-build:
        description: "Run the build. Set false for legacy sites whose build needs secrets not in CI."
        type: boolean
        default: true
      run-e2e:
        description: "Run Playwright + axe. Auto-skips anyway if no playwright config is found."
        type: boolean
        default: true
      run-lighthouse:
        type: boolean
        default: true
      run-registry-checks:
        description: "Run promoted mistakes-registry checks (S1 hook)."
        type: boolean
        default: true
      run-dependency-audit:
        description: "Audit prod dependencies for known vulnerabilities (high+ fails)."
        type: boolean
        default: true
      run-zap:
        description: "OWASP ZAP baseline scan (passive DAST) against the built app.
          Runs inside the Lighthouse job (needs the booted site), so it also
          requires run-lighthouse. Report always uploads as an artifact; the step
          fails only on FAIL-level alerts (promote rules via a repo .zap/rules.tsv)."
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: install · typecheck · lint · build · a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then pm=pnpm; cache=pnpm
          elif [ -f yarn.lock ]; then pm=yarn; cache=yarn
          elif [ -f package-lock.json ]; then pm=npm; cache=npm
          else pm=npm; cache=
          fi
          echo "pm=$pm" >> "$GITHUB_OUTPUT"
          # setup-node's cache requires a lockfile; leave empty when there is none.
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
          echo "Detected package manager: $pm"

      - uses: pnpm/action-setup@v6
        if: steps.pm.outputs.pm == 'pnpm'

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.pm.outputs.cache }}
          registry-url: https://npm.pkg.github.com

      - name: Install
        run: |
          case "${{ steps.pm.outputs.pm }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) corepack enable && (yarn install --immutable || yarn install --frozen-lockfile) ;;
            npm)  if [ -f package-lock.json ]; then npm ci; else npm install; fi ;;
          esac
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Each gate below skips cleanly when the repo doesn't define it, so the same
      # workflow serves a fully-tooled platform site and a bespoke legacy site.
      - name: Typecheck (if defined)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.typecheck?0:1)" 2>/dev/null; then
            case "${{ steps.pm.outputs.pm }}" in pnpm) pnpm typecheck ;; yarn) yarn typecheck ;; npm) npm run typecheck ;; esac
          else echo "No typecheck script — skipping."; fi

      - name: Biome (if configured)
        # Run an EXACT, pinned Biome version (inputs.biome-version), not the repo's
        # installed/`latest` Biome. Otherwise a new Biome release (e.g. 2.4.16→2.5.0)
        # reformats/re-lints a previously-green tree and turns CI red with no code
        # change (the recurring biome-v2 drift). `npx --yes` fetches the pinned
        # version regardless of the package manager, so CI no longer depends on the
        # resolved devDependency. Upgrade deliberately: bump biome-version + run
        # `biome migrate` + `biome format --write` together.
        run: |
          if [ -f biome.json ] || [ -f biome.jsonc ]; then
            ver='${{ inputs.biome-version }}'
            echo "Running pinned @biomejs/biome@${ver}"
            # npx (ships with Node) fetches+runs the pinned version regardless of the
            # repo's package manager — avoids yarn-classic having no `dlx` and avoids
            # the resolved devDependency drifting CI.
            npx --yes @biomejs/biome@"${ver}" ci .
          else echo "No Biome config — skipping (legacy site not yet on the lint floor)."; fi

      - name: Build (if enabled & defined)
        if: ${{ inputs.run-build }}
        run: |
          CMD="${{ inputs.build-command }}"
          if [ -n "$CMD" ]; then
            eval "$CMD"
          elif node -e "process.exit(require('./package.json').scripts?.build?0:1)" 2>/dev/null; then
            case "${{ steps.pm.outputs.pm }}" in pnpm) pnpm build ;; yarn) yarn build ;; npm) npm run build ;; esac
          else echo "No build script — skipping."; fi

      # Find the package that OWNS Playwright and run it THERE — never at the
      # workspace root. In a monorepo, @playwright/test is a devDep of one package
      # (e.g. @vinny/ui), so `pnpm exec playwright` at the root fails with
      # ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL. We cd into the config's directory so the
      # local resolution finds it.
      - name: Detect Playwright
        id: pw
        run: |
          dir=""
          if [ "${{ inputs.run-e2e }}" = "true" ]; then
            cfg=$(ls playwright.config.* packages/*/playwright.config.* apps/*/playwright.config.* 2>/dev/null | head -1 || true)
            [ -n "$cfg" ] && dir=$(dirname "$cfg")
          fi
          if [ -n "$dir" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "dir=$dir" >> "$GITHUB_OUTPUT"
            echo "Playwright config found in: $dir"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Playwright config found (or run-e2e=false) — skipping e2e/a11y."
          fi

      - name: Install Playwright browsers
        if: steps.pw.outputs.present == 'true'
        working-directory: ${{ steps.pw.outputs.dir }}
        run: |
          # chromium + webkit: sites carry a `webkit-iphone` Playwright project
          # (iPhone Safari coverage) — a chromium-only install would fail it.
          case "${{ steps.pm.outputs.pm }}" in
            pnpm) pnpm exec playwright install --with-deps chromium webkit ;;
            yarn) yarn playwright install --with-deps chromium webkit ;;
            npm)  npx playwright install --with-deps chromium webkit ;;
          esac

      - name: Playwright + axe
        if: steps.pw.outputs.present == 'true'
        working-directory: ${{ steps.pw.outputs.dir }}
        run: |
          case "${{ steps.pm.outputs.pm }}" in
            pnpm) pnpm exec playwright test ;;
            yarn) yarn playwright test ;;
            npm)  npx playwright test ;;
          esac

  lighthouse:
    name: Lighthouse-CI budgets + ZAP baseline
    if: ${{ inputs.run-lighthouse }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then pm=pnpm; cache=pnpm
          elif [ -f yarn.lock ]; then pm=yarn; cache=yarn
          elif [ -f package-lock.json ]; then pm=npm; cache=npm
          else pm=npm; cache=
          fi
          echo "pm=$pm" >> "$GITHUB_OUTPUT"
          # setup-node's cache requires a lockfile; leave empty when there is none.
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v6
        if: steps.pm.outputs.pm == 'pnpm'
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.pm.outputs.cache }}
          registry-url: https://npm.pkg.github.com
      - name: Install
        run: |
          case "${{ steps.pm.outputs.pm }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) corepack enable && (yarn install --immutable || yarn install --frozen-lockfile) ;;
            npm)  if [ -f package-lock.json ]; then npm ci; else npm install; fi ;;
          esac
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: |
          CMD="${{ inputs.build-command }}"
          if [ -n "$CMD" ]; then
            eval "$CMD"
          else
            case "${{ steps.pm.outputs.pm }}" in pnpm) pnpm build ;; yarn) yarn build ;; npm) npm run build ;; esac
          fi
      - name: Lighthouse-CI
        run: |
          # A repo-local lighthouserc owns the run (its URL list + budgets, e.g.
          # the SEO/CWV assertions). The workflow inputs only drive repos that
          # haven't adopted a config yet — passing the CLI flags unconditionally
          # would override the config's collect.url and silently shrink the
          # audit to a single page.
          if [ -f lighthouserc.json ] || [ -f lighthouserc.js ] || [ -f .lighthouserc.json ] || [ -f .lighthouserc.js ]; then
            echo "lhci: repo lighthouserc found — config drives URLs + budgets"
            case "${{ steps.pm.outputs.pm }}" in
              pnpm) pnpm exec lhci autorun ;;
              yarn) yarn lhci autorun ;;
              npm)  npx --yes @lhci/cli autorun ;;
            esac
          else
            echo "lhci: no repo lighthouserc — using workflow input flags"
            case "${{ steps.pm.outputs.pm }}" in
              pnpm) pnpm exec lhci autorun --collect.startServerCommand="${{ inputs.start-command }}" --collect.url="${{ inputs.lighthouse-url }}" ;;
              yarn) yarn lhci autorun --collect.startServerCommand="${{ inputs.start-command }}" --collect.url="${{ inputs.lighthouse-url }}" ;;
              npm)  npx --yes @lhci/cli autorun --collect.startServerCommand="${{ inputs.start-command }}" --collect.url="${{ inputs.lighthouse-url }}" ;;
            esac
          fi
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # OWASP ZAP baseline (passive DAST: headers, cookies, XSS sinks, mixed
      # content, exposed info). Reuses this job's build; lhci stops its own
      # server, so boot the app once more for the scan.
      - name: Start app for ZAP
        if: ${{ inputs.run-zap }}
        run: |
          nohup ${{ inputs.start-command }} >/tmp/zap-app.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sSf -o /dev/null "${{ inputs.lighthouse-url }}" && exit 0
            sleep 2
          done
          echo "App never became ready for ZAP:"; tail -50 /tmp/zap-app.log; exit 1

      - name: ZAP baseline scan
        if: ${{ inputs.run-zap }}
        run: |
          # Passive rules only — safe against any environment. ZAP's defaults are
          # all WARN-level; -I keeps warnings non-blocking (they land in the
          # uploaded report). A repo escalates specific alerts to FAIL by
          # shipping .zap/rules.tsv — those then red the build.
          mkdir -p zap-out && chmod 777 zap-out
          RULES=""
          if [ -f .zap/rules.tsv ]; then
            cp .zap/rules.tsv zap-out/rules.tsv
            RULES="-c rules.tsv"
            echo "zap: using repo-promoted rules (.zap/rules.tsv)"
          fi
          docker run --rm --network host -v "$PWD/zap-out:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "${{ inputs.lighthouse-url }}" -I $RULES \
            -r zap-baseline-report.html -w zap-baseline-report.md

      - name: Upload ZAP report
        if: ${{ always() && inputs.run-zap }}
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-out/zap-baseline-report.*
          if-no-files-found: ignore

  dependency-audit:
    name: dependency audit (high+ vulns)
    if: ${{ inputs.run-dependency-audit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        if: hashFiles('pnpm-lock.yaml') != ''
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
      # Audits read the lockfile and query the public advisory DB — no install
      # needed. Private @geniemarketing packages aren't in the DB, so they are
      # skipped, not failed. Gate at high+ so a low/moderate transitive advisory
      # can't red the whole org at once; prod deps only (devDeps never ship).
      - name: Audit prod dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm audit --prod --audit-level high
          elif [ -f yarn.lock ]; then
            # yarn classic's audit exit code is a severity BITMASK (non-zero even
            # for low-only findings) — run it as advisory output, don't gate on it.
            corepack enable
            yarn audit --level high --groups dependencies \
              || echo "::warning::yarn audit reported advisories — review the log above"
          elif [ -f package-lock.json ]; then
            npm audit --omit=dev --audit-level=high
          else
            echo "No lockfile — skipping dependency audit."
          fi

  secrets-scan:
    name: gitleaks (OSS binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Upstream OSS binary — no GITLEAKS_LICENSE, works on org-owned repos.
      - name: gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # Use the repo's own .gitleaks.toml if it ships one (repos that want the
          # org rules+allowlist copy the canonical one from GENIEMARKETING/.github);
          # otherwise scan with gitleaks' default ruleset so every repo still scans.
          if [ -f .gitleaks.toml ]; then
            echo "gitleaks: using repo-local .gitleaks.toml"
            ./gitleaks detect --source . --redact --no-banner --config .gitleaks.toml --exit-code 1
          else
            echo "gitleaks: no repo .gitleaks.toml — scanning with default rules"
            ./gitleaks detect --source . --redact --no-banner --exit-code 1
          fi

  mistakes-registry:
    name: mistakes-registry checks (S1 hook)
    if: ${{ inputs.run-registry-checks }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Extension point for S1: promoted entries from mistakes-registry/ land here
      # as executable checks. Contract: if the repo ships `.mistakes-registry/checks.sh`
      # (or a `mistakes:check` package script), it runs and must exit 0. Until S1
      # promotes the first rule, this is a green no-op so it can be made a required
      # check now without blocking anyone.
      - name: Run promoted registry checks
        run: |
          if [ -x .mistakes-registry/checks.sh ]; then
            echo "Running repo-local mistakes-registry checks…"
            .mistakes-registry/checks.sh
          elif [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.['mistakes:check']?0:1)" 2>/dev/null; then
            echo "Running 'mistakes:check' package script…"
            if [ -f pnpm-lock.yaml ]; then pnpm run mistakes:check; elif [ -f yarn.lock ]; then yarn mistakes:check; else npm run mistakes:check; fi
          else
            echo "No promoted mistakes-registry checks yet (S1 hook idle) — passing."
          fi
